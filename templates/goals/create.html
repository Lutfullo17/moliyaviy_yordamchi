{% extends 'base.html' %}

{% block title %}{% if goal %}Tahrirlash{% else %}Yangi Maqsad{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="bg-emerald-600 p-6">
            <h1 class="text-2xl font-bold text-white">
                {% if goal %}Maqsadni o'zgartirish{% else %}Yangi maqsad yaratish{% endif %}
            </h1>
            <p class="text-emerald-100 text-sm opacity-90">Aniq maqsad — muvaffaqiyatning yarmi.</p>
        </div>

        <form method="POST" class="p-8 space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Maqsad nomi</label>
                <input type="text" name="title" value="{{ form.title.value|default:'' }}" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none transition-all"
                       placeholder="Masalan: Yangi iPhone uchun">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Maqsadli summa (so'm)</label>
                    <div class="relative">
                        <input type="text" inputmode="numeric" name="target_amount" value="{{ form.target_amount.value|default:'' }}" required
                               class="money-input w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none transition-all"
                               placeholder="Masalan: 5,000,000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Boshlang'ich summa (so'm)</label>
                    <div class="relative">
                        <input type="text" inputmode="numeric" name="current_amount" value="{{ form.current_amount.value|default:'0' }}" required
                               class="money-input w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none transition-all"
                               placeholder="Masalan: 500,000">
                    </div>
                </div>
            </div>

           <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Maqsadga erishish muddati</label>
                <input type="date"
                       name="deadline"
                       value="{{ form.deadline.value|date:'Y-m-d'|default:'' }}"
                       required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none transition-all">
            </div>

            <div class="flex items-center gap-4 pt-6">
                <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl transition-all shadow-lg shadow-emerald-100">
                    Saqlash
                </button>
                <a href="{% url 'goals:list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center font-bold py-3.5 rounded-2xl transition-all">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
