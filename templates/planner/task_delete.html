{% extends 'base.html' %}

{% block title %}Vazifani o'chirish - MoliyaBot{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-3xl border border-red-100 p-8 shadow-xl text-center">
        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">Vazifani o'chirish</h2>
        <p class="text-slate-500 font-medium mb-8">Haqiqatdan ham <strong>"{{ task.title }}"</strong> nomli vazifani ro'yxatdan o'chirmoqchimisiz? Bu amalni ortga qaytarib bo'lmaydi.</p>
        
        <form method="POST" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'task-update' task.id %}" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-2xl hover:bg-slate-200 transition-colors">
                Bekor qilish
            </a>
            <button type="submit" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-2xl hover:bg-red-600 transition-colors shadow-lg shadow-red-200">
                O'chirish
            </button>
        </form>
    </div>
</div>
{% endblock %}
