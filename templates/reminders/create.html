{% extends 'base.html' %}

{% block title %}Yangi Eslatma{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">

<div class="max-w-xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-amber-400 to-amber-600 p-8 text-white">
            <h1 class="text-2xl font-bold">Eslatma o'rnatish</h1>
            <p class="text-amber-100 text-sm opacity-90">Vaqtni belgilang, biz sizga eslatamiz.</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}

            {% if error %}
            <div class="p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm flex items-center gap-3">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Nima haqida eslataylik?</label>
                <input type="text" name="title" required placeholder="Masalan: Kvartira to'lovi"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-amber-50 focus:border-amber-400 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Batafsil (ixtiyoriy)</label>
                <textarea name="description" rows="3" placeholder="Qo'shimcha ma'lumotlar..."
                          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-amber-50 focus:border-amber-400 outline-none transition-all"></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Eslatish vaqti</label>
                <div class="relative">
                    <input type="text" id="remind_time_picker" name="remind_time" required
                           placeholder="Sana va vaqtni tanlang"
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-amber-50 focus:border-amber-400 outline-none transition-all bg-white">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 mt-2 italic">Format: DD.MM.YYYY, 24 soatlik vaqt</p>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-amber-100 transition-all">
                    Eslatmani saqlash
                </button>
                <a href="{% url 'reminders:list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center font-bold py-3.5 rounded-2xl transition-all">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/uz.js"></script> <script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr("#remind_time_picker", {
            enableTime: true,
            dateFormat: "d.m.Y H:i", // Sana.Oy.Yil Soat:Daqiqa (24 soatlik)
            time_24hr: true,         // AM/PM ni o'chiradi
            minDate: "today",        // O'tib ketgan sanani tanlab bo'lmaydi
            locale: "uz",            // O'zbek tili (agar yuklangan bo'lsa)
            allowInput: true
        });
    });
</script>
{% endblock %}
