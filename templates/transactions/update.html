{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Tranzaksiyani tahrirlash</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div class="space-y-2">
            {{ form.as_p }}
        </div>

        <div class="flex gap-4 pt-4">
            <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl transition-all shadow-md shadow-emerald-100">
                O'zgarishlarni saqlash
            </button>
            <a href="/transactions/" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 rounded-2xl text-center transition-all">
                Bekor qilish
            </a>
        </div>
    </form>
</div>
{% endblock %}
