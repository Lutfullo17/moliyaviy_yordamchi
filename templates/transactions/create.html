{% extends 'base.html' %}

{% block title %}Tranzaksiya - MoliyaBot{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="bg-blue-600 p-8 text-white">
            <h1 class="text-2xl font-bold">{% if transaction %}Tahrirlash{% else %}Yangi amal qo'shish{% endif %}</h1>
            <p class="text-blue-100 text-sm opacity-90">Moliyaviy holatingizni aniq yozib boring.</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Summa</label>
                    <input type="number" step="0.01" name="amount" value="{{ form.amount.value|default:'' }}" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 outline-none transition-all font-bold text-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Amal turi</label>
                    <select name="type" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-50 outline-none bg-white">
                        <option value="expense" {% if form.type.value == 'expense' %}selected{% endif %}>Xarajat (-)</option>
                        <option value="income" {% if form.type.value == 'income' %}selected{% endif %}>Daromad (+)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Kategoriya</label>
                    <select name="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-50 outline-none bg-white">
                        <option value="">Tanlang...</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if form.category.value == cat.id|stringformat:"i" %}selected{% endif %}>{{ cat.name|capfirst }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Sana</label>
                    <input type="date" name="date" value="{{ form.date.value|date:'Y-m-d'|default:'' }}" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-50 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Izoh (ixtiyoriy)</label>
                <textarea name="note" rows="3" placeholder="Masalan: Tushlik yoki Oylik maosh..."
                          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 outline-none transition-all">{{ form.note.value|default:'' }}</textarea>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-100 transition-all">
                    Saqlash
                </button>
                <a href="{% url 'transactions:list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center font-bold py-3.5 rounded-2xl transition-all">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
