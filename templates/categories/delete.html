{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-10">
        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-trash-alt text-3xl"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Kategoriyani o'chirish?</h1>
        <p class="text-slate-500 mb-8 px-4">
            Siz haqiqatdan ham <strong class="text-slate-900 capitalize">"{{ category.name }}"</strong> kategoriyasini o'chirib tashlamoqchimisiz? Bu amalni qaytarib bo'lmaydi.
        </p>

        <form method="POST" class="flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-xl transition-all">
                Ha, o'chirib tashlansin
            </button>
            <a href="{% url 'categories:list' %}" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition-all">
                Yo'q, bekor qilish
            </a>
        </form>
    </div>
</div>
{% endblock %}
