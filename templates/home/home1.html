<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --surface3: #242430;
    --border: #2a2a36;
    --accent: #c8f560;
    --accent2: #6c63ff;
    --accent3: #ff6b6b;
    --text: #eeeef2;
    --muted: #7070889;
    --muted2: #55556a;
    --low: #60d394;
    --medium: #ffd166;
    --high: #ef476f;
    --done: #60d394;
    --pending: #ffd166;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--accent);
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }

  .nav { padding: 20px 12px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--muted2);
    transition: all 0.18s;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--surface3);
    color: var(--accent);
    border-color: var(--border);
  }
  .nav-item svg { flex-shrink: 0; }

  .sidebar-date {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--muted2);
    line-height: 1.8;
  }
  .sidebar-date strong { color: var(--text); display: block; font-size: 0.85rem; }

  /* ─── MAIN ─── */
  .main {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 16px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.3px;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .date-nav button:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }

  #date-display {
    font-size: 0.82rem;
    color: var(--muted2);
    min-width: 130px;
    text-align: center;
  }
  #date-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
  }
  #date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); }

  .page { display: none; padding: 32px 36px; flex: 1; }
  .page.active { display: block; }

  /* ─── SECTION HEADER ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
  }
  .section-title span { color: var(--accent); }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #b8e550; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,245,96,0.2); }
  .btn-ghost {
    background: transparent;
    color: var(--muted2);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: var(--high);
    border-color: var(--high);
  }
  .btn-danger:hover { background: rgba(239,71,111,0.1); }
  .btn-sm { padding: 5px 12px; font-size: 0.72rem; }
  .btn-icon {
    padding: 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: var(--surface3); color: var(--text); }
  .btn-icon.danger:hover { background: rgba(239,71,111,0.1); color: var(--high); border-color: var(--high); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 30px;
    width: 100%;
    max-width: 440px;
    animation: modalIn 0.2s ease;
    position: relative;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 20px;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted2);
    cursor: pointer; font-size: 1.1rem; padding: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  /* ─── FORM ─── */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted2);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .form-control {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control::placeholder { color: var(--muted2); }
  textarea.form-control { resize: vertical; min-height: 72px; }
  select.form-control { cursor: pointer; }
  select.form-control option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .error-msg {
    background: rgba(239,71,111,0.1);
    border: 1px solid rgba(239,71,111,0.3);
    color: var(--high);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 0.78rem;
    margin-bottom: 14px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ─── CATEGORIES PAGE ─── */
  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .category-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .category-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent2);
    border-radius: 0;
  }
  .category-card.default::before { background: var(--accent); }
  .category-card:hover { border-color: var(--border); background: var(--surface2); transform: translateY(-2px); }

  .category-name {
    font-size: 0.88rem;
    font-weight: 500;
    text-transform: capitalize;
    flex: 1;
  }
  .category-badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(200,245,96,0.1);
    color: var(--accent);
    border: 1px solid rgba(200,245,96,0.2);
    letter-spacing: 0.5px;
  }
  .category-actions { display: flex; gap: 6px; }

  /* ─── PLANNER PAGE ─── */
  .planner-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .stat-label { font-size: 0.68rem; color: var(--muted2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.8rem; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.done { color: var(--done); }
  .stat-value.high { color: var(--high); }
  .stat-value.medium { color: var(--medium); }

  .tasks-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .filter-chip:hover { background: var(--surface2); color: var(--text); }
  .filter-chip.active {
    background: var(--surface3);
    color: var(--accent);
    border-color: var(--accent);
  }

  .tasks-list { display: flex; flex-direction: column; gap: 10px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .task-card:hover { background: var(--surface2); }
  .task-card.done-card { opacity: 0.55; }
  .task-card.done-card .task-title { text-decoration: line-through; }

  .task-priority-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-priority-bar.low { background: var(--low); }
  .task-priority-bar.medium { background: var(--medium); }
  .task-priority-bar.high { background: var(--high); }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--done); border-color: var(--done); }
  .task-check.checked::after { content: '✓'; color: #0d0d0f; font-size: 0.65rem; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 0.88rem; font-weight: 500; margin-bottom: 4px; }
  .task-desc { font-size: 0.75rem; color: var(--muted2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    font-weight: 500;
  }
  .badge-priority-low { background: rgba(96,211,148,0.12); color: var(--low); border: 1px solid rgba(96,211,148,0.25); }
  .badge-priority-medium { background: rgba(255,209,102,0.12); color: var(--medium); border: 1px solid rgba(255,209,102,0.25); }
  .badge-priority-high { background: rgba(239,71,111,0.12); color: var(--high); border: 1px solid rgba(239,71,111,0.25); }
  .badge-done { background: rgba(96,211,148,0.12); color: var(--done); border: 1px solid rgba(96,211,148,0.25); }
  .badge-pending { background: rgba(255,209,102,0.12); color: var(--medium); border: 1px solid rgba(255,209,102,0.25); }
  .badge-important { background: rgba(108,99,255,0.12); color: var(--accent2); border: 1px solid rgba(108,99,255,0.25); }

  .task-time { font-size: 0.7rem; color: var(--muted2); }

  .task-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted2);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--text); margin-bottom: 6px; opacity: 0.5; }
  .empty-sub { font-size: 0.78rem; opacity: 0.5; }

  /* ─── TOAST ─── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toastIn 0.25s ease;
    max-width: 280px;
  }
  .toast.error { border-left-color: var(--high); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Checkbox trick for important star */
  .star-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted2); font-size: 0.95rem;
    transition: color 0.15s;
    padding: 4px;
  }
  .star-btn.active { color: var(--medium); }
  .star-btn:hover { color: var(--medium); }

  /* loading */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 40px; color: var(--muted2); font-size: 0.8rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

  /* Responsive */
  @media (max-width: 900px) {
    .planner-stats { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 700px) {
    .sidebar { width: 60px; padding: 16px 0; }
    .logo { display: none; }
    .nav-item span { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .sidebar-date { display: none; }
    .main { margin-left: 60px; }
    .page { padding: 20px 16px; }
    .topbar { padding: 12px 16px; }
    .planner-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">plan<span>ner</span></div>
  <nav class="nav">
    <div class="nav-item active" data-page="planner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Planner</span>
    </div>
    <div class="nav-item" data-page="categories">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      <span>Categories</span>
    </div>
  </nav>
  <div class="sidebar-date">
    <strong id="sb-weekday">—</strong>
    <span id="sb-date">—</span>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-title" id="page-title">Planner</div>
    <div class="date-nav" id="date-nav-block">
      <button id="prev-day" title="Oldingi kun">&#8592;</button>
      <span id="date-display">—</span>
      <button id="next-day" title="Keyingi kun">&#8594;</button>
      <input type="date" id="date-input" title="Sana tanlang"/>
    </div>
  </header>

  <!-- ═══ PLANNER PAGE ═══ -->
  <section class="page active" id="page-planner">

    <div class="section-header">
      <div class="section-title">Bugungi <span>vazifalar</span></div>
      <button class="btn btn-primary" id="open-task-modal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Vazifa qo'sh
      </button>
    </div>

    <div class="planner-stats">
      <div class="stat-card">
        <div class="stat-label">Jami</div>
        <div class="stat-value accent" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bajarildi</div>
        <div class="stat-value done" id="stat-done">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Muhim</div>
        <div class="stat-value medium" id="stat-important">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Yuqori priority</div>
        <div class="stat-value high" id="stat-high">0</div>
      </div>
    </div>

    <div class="tasks-filters">
      <button class="filter-chip active" data-filter="all">Barchasi</button>
      <button class="filter-chip" data-filter="pending">Kutilmoqda</button>
      <button class="filter-chip" data-filter="done">Bajarildi</button>
      <button class="filter-chip" data-filter="high">🔴 Yuqori</button>
      <button class="filter-chip" data-filter="important">⭐ Muhim</button>
    </div>

    <div id="tasks-loading" class="loading-row" style="display:none">
      <div class="spinner"></div> <span>Yuklanmoqda...</span>
    </div>
    <div class="tasks-list" id="tasks-list"></div>

  </section>

  <!-- ═══ CATEGORIES PAGE ═══ -->
  <section class="page" id="page-categories">

    <div class="section-header">
      <div class="section-title">Kategoriya<span>lar</span></div>
      <button class="btn btn-primary" id="open-cat-modal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Qo'shish
      </button>
    </div>

    <div id="cats-loading" class="loading-row" style="display:none">
      <div class="spinner"></div> <span>Yuklanmoqda...</span>
    </div>
    <div class="categories-grid" id="categories-grid"></div>

  </section>

</main>

<!-- ═══ TASK MODAL ═══ -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="task-modal-title">Yangi Vazifa</div>
    <button class="modal-close" id="close-task-modal">✕</button>
    <div class="error-msg" id="task-error"></div>
    <input type="hidden" id="task-id"/>
    <div class="form-group">
      <label class="form-label">Sarlavha *</label>
      <input class="form-control" type="text" id="task-title" placeholder="Vazifa nomi..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Tavsif</label>
      <textarea class="form-control" id="task-desc" placeholder="Qo'shimcha ma'lumot..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Boshlanish</label>
        <input class="form-control" type="time" id="task-start"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tugash</label>
        <input class="form-control" type="time" id="task-end"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-control" id="task-priority">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Holat</label>
        <select class="form-control" id="task-status">
          <option value="pending">Kutilmoqda</option>
          <option value="done">Bajarildi</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;color:var(--muted2)">
        <input type="checkbox" id="task-important" style="accent-color:var(--accent);width:15px;height:15px"/>
        Muhim vazifa
      </label>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancel-task">Bekor</button>
      <button class="btn btn-primary" id="save-task">Saqlash</button>
    </div>
  </div>
</div>

<!-- ═══ CATEGORY MODAL ═══ -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-title" id="cat-modal-title">Yangi Kategoriya</div>
    <button class="modal-close" id="close-cat-modal">✕</button>
    <div class="error-msg" id="cat-error"></div>
    <input type="hidden" id="cat-id"/>
    <div class="form-group">
      <label class="form-label">Nomi *</label>
      <input class="form-control" type="text" id="cat-name" placeholder="Kategoriya nomi..."/>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancel-cat">Bekor</button>
      <button class="btn btn-primary" id="save-cat">Saqlash</button>
    </div>
  </div>
</div>

<!-- ═══ DELETE CONFIRM MODAL ═══ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div class="modal-title" style="margin-bottom:10px">O'chirishni tasdiqlang</div>
    <p style="font-size:0.82rem;color:var(--muted2);margin-bottom:22px" id="confirm-msg">Haqiqatan ham o'chirmoqchimisiz?</p>
    <div class="form-actions" style="justify-content:center">
      <button class="btn btn-ghost" id="confirm-cancel">Yo'q</button>
      <button class="btn btn-danger" id="confirm-ok">O'chirish</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── CONFIG ───
const API_BASE = '';  // Django backend URL. e.g. 'http://localhost:8000'
const CSRF_TOKEN = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';

// ─── STATE ───
let currentPage = 'planner';
let currentDate = new Date();
let tasks = [];
let categories = [];
let currentFilter = 'all';
let confirmCallback = null;

// ─── UTILS ───
function formatDate(d) {
  return d.toISOString().split('T')[0];
}
function formatDisplayDate(d) {
  return d.toLocaleDateString('uz-UZ', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
}
function formatWeekday(d) {
  return d.toLocaleDateString('uz-UZ', { weekday:'long' });
}
function formatDay(d) {
  return d.toLocaleDateString('uz-UZ', { day:'2-digit', month:'long', year:'numeric' });
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast${type==='error'?' error':''}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

async function apiFetch(url, opts={}) {
  const defaults = {
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
    credentials: 'same-origin',
  };
  const res = await fetch(API_BASE + url, { ...defaults, ...opts, headers: { ...defaults.headers, ...(opts.headers||{}) } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.status === 204 ? {} : res.json();
}

// ─── DATE NAVIGATION ───
function updateDateUI() {
  document.getElementById('date-display').textContent = formatDisplayDate(currentDate);
  document.getElementById('date-input').value = formatDate(currentDate);
  document.getElementById('sb-weekday').textContent = formatWeekday(currentDate);
  document.getElementById('sb-date').textContent = formatDay(currentDate);
}

document.getElementById('prev-day').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() - 1);
  updateDateUI();
  loadTasks();
});
document.getElementById('next-day').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() + 1);
  updateDateUI();
  loadTasks();
});
document.getElementById('date-input').addEventListener('change', e => {
  currentDate = new Date(e.target.value + 'T00:00:00');
  updateDateUI();
  loadTasks();
});

// ─── PAGE NAVIGATION ───
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    item.classList.add('active');
    currentPage = item.dataset.page;
    document.getElementById(`page-${currentPage}`).classList.add('active');
    document.getElementById('page-title').textContent = currentPage === 'planner' ? 'Planner' : 'Kategoriyalar';
    document.getElementById('date-nav-block').style.display = currentPage === 'planner' ? 'flex' : 'none';
    if (currentPage === 'categories') loadCategories();
  });
});

// ─── TASKS ───
async function loadTasks() {
  document.getElementById('tasks-loading').style.display = 'flex';
  document.getElementById('tasks-list').innerHTML = '';
  try {
    const date = formatDate(currentDate);
    const data = await apiFetch(`/planner/?date=${date}`);
    tasks = data.tasks || [];
    renderTasks();
  } catch(e) {
    toast('Vazifalarni yuklashda xato: ' + e.message, 'error');
    renderTasks();
  } finally {
    document.getElementById('tasks-loading').style.display = 'none';
  }
}

function getFilteredTasks() {
  if (currentFilter === 'all') return tasks;
  if (currentFilter === 'pending') return tasks.filter(t => t.status === 'pending');
  if (currentFilter === 'done') return tasks.filter(t => t.status === 'done');
  if (currentFilter === 'high') return tasks.filter(t => t.priority === 'high');
  if (currentFilter === 'important') return tasks.filter(t => t.is_important);
  return tasks;
}

function renderTasks() {
  const list = document.getElementById('tasks-list');
  const filtered = getFilteredTasks();

  // Stats
  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-done').textContent = tasks.filter(t=>t.status==='done').length;
  document.getElementById('stat-important').textContent = tasks.filter(t=>t.is_important).length;
  document.getElementById('stat-high').textContent = tasks.filter(t=>t.priority==='high').length;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Vazifalar yo'q</div>
      <div class="empty-sub">Bu kun uchun hech narsa topilmadi</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="task-card ${t.status==='done'?'done-card':''}" data-id="${t.id}">
      <div class="task-priority-bar ${t.priority}"></div>
      <div class="task-check ${t.status==='done'?'checked':''}" data-id="${t.id}" onclick="toggleTask(${t.id})"></div>
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="badge badge-priority-${t.priority}">${t.priority}</span>
          <span class="badge badge-${t.status}">${t.status==='done'?'Bajarildi':'Kutilmoqda'}</span>
          ${t.is_important ? '<span class="badge badge-important">⭐ Muhim</span>' : ''}
          ${t.start_time ? `<span class="task-time">${t.start_time}${t.end_time?' – '+t.end_time:''}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="star-btn ${t.is_important?'active':''}" title="Muhim" onclick="toggleImportant(${t.id})">★</button>
        <button class="btn-icon" title="Tahrirlash" onclick="openEditTask(${t.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" title="O'chirish" onclick="deleteTask(${t.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function toggleTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  const newStatus = t.status === 'done' ? 'pending' : 'done';
  try {
    await apiFetch(`/tasks/${id}/`, { method:'PATCH', body: JSON.stringify({ status: newStatus }) });
    t.status = newStatus;
    renderTasks();
    toast(newStatus === 'done' ? '✓ Bajarildi!' : 'Qayta ochildi');
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleImportant(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  try {
    await apiFetch(`/tasks/${id}/`, { method:'PATCH', body: JSON.stringify({ is_important: !t.is_important }) });
    t.is_important = !t.is_important;
    renderTasks();
  } catch(e) { toast(e.message, 'error'); }
}

function deleteTask(id) {
  const t = tasks.find(x=>x.id===id);
  showConfirm(`"${t?.title||'Vazifa'}" ni o'chirasizmi?`, async () => {
    try {
      await apiFetch(`/tasks/${id}/`, { method:'DELETE' });
      tasks = tasks.filter(x=>x.id!==id);
      renderTasks();
      toast('Vazifa o\'chirildi');
    } catch(e) { toast(e.message, 'error'); }
  });
}

function openEditTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('task-modal-title').textContent = 'Vazifani Tahrirlash';
  document.getElementById('task-id').value = t.id;
  document.getElementById('task-title').value = t.title;
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-start').value = t.start_time || '';
  document.getElementById('task-end').value = t.end_time || '';
  document.getElementById('task-priority').value = t.priority;
  document.getElementById('task-status').value = t.status;
  document.getElementById('task-important').checked = t.is_important;
  document.getElementById('task-error').classList.remove('show');
  document.getElementById('task-modal').classList.add('open');
}

// ─── TASK MODAL ───
document.getElementById('open-task-modal').addEventListener('click', () => {
  document.getElementById('task-modal-title').textContent = 'Yangi Vazifa';
  document.getElementById('task-id').value = '';
  document.getElementById('task-title').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-start').value = '';
  document.getElementById('task-end').value = '';
  document.getElementById('task-priority').value = 'medium';
  document.getElementById('task-status').value = 'pending';
  document.getElementById('task-important').checked = false;
  document.getElementById('task-error').classList.remove('show');
  document.getElementById('task-modal').classList.add('open');
});
document.getElementById('close-task-modal').addEventListener('click', () => document.getElementById('task-modal').classList.remove('open'));
document.getElementById('cancel-task').addEventListener('click', () => document.getElementById('task-modal').classList.remove('open'));

document.getElementById('save-task').addEventListener('click', async () => {
  const id = document.getElementById('task-id').value;
  const title = document.getElementById('task-title').value.trim();
  const errEl = document.getElementById('task-error');

  if (!title) { errEl.textContent = 'Sarlavha kiritilishi shart!'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  const payload = {
    title,
    description: document.getElementById('task-desc').value.trim(),
    start_time: document.getElementById('task-start').value || null,
    end_time: document.getElementById('task-end').value || null,
    priority: document.getElementById('task-priority').value,
    status: document.getElementById('task-status').value,
    is_important: document.getElementById('task-important').checked,
    date: formatDate(currentDate),
  };

  try {
    if (id) {
      const updated = await apiFetch(`/tasks/${id}/`, { method:'PATCH', body: JSON.stringify(payload) });
      const idx = tasks.findIndex(t=>t.id==id);
      if (idx>=0) tasks[idx] = { ...tasks[idx], ...updated, ...payload };
      toast('Vazifa yangilandi ✓');
    } else {
      const created = await apiFetch('/tasks/', { method:'POST', body: JSON.stringify(payload) });
      tasks.push({ ...created, ...payload });
      toast('Vazifa qo\'shildi ✓');
    }
    document.getElementById('task-modal').classList.remove('open');
    renderTasks();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  }
});

// ─── FILTER CHIPS ───
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderTasks();
  });
});

// ─── CATEGORIES ───
async function loadCategories() {
  document.getElementById('cats-loading').style.display = 'flex';
  document.getElementById('categories-grid').innerHTML = '';
  try {
    const res = await fetch(API_BASE + '/categories/', { credentials:'same-origin' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    // If backend returns JSON (if you add an API endpoint), parse it
    // For now we'll try to parse categories from JSON endpoint if available
    // Try JSON first:
    try {
      const data = JSON.parse(html);
      categories = Array.isArray(data) ? data : (data.categories || data.results || []);
    } catch {
      categories = [];
    }
    renderCategories();
  } catch(e) {
    // demo fallback
    categories = [];
    renderCategories();
    toast('Kategoriyalar yuklanmadi. Backend URL ni tekshiring.', 'error');
  } finally {
    document.getElementById('cats-loading').style.display = 'none';
  }
}

function renderCategories() {
  const grid = document.getElementById('categories-grid');
  if (!categories.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🗂️</div>
      <div class="empty-title">Kategoriyalar yo'q</div>
      <div class="empty-sub">Birinchi kategoriyani qo'shing</div>
    </div>`;
    return;
  }
  grid.innerHTML = categories.map(c => `
    <div class="category-card ${c.is_default?'default':''}">
      <div>
        <div class="category-name">${escHtml(c.name)}</div>
        ${c.is_default?'<div class="category-badge">default</div>':''}
      </div>
      ${!c.is_default ? `<div class="category-actions">
        <button class="btn-icon" onclick="openEditCat(${c.id},'${escHtml(c.name)}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" onclick="deleteCat(${c.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>` : ''}
    </div>
  `).join('');
}

function openEditCat(id, name) {
  document.getElementById('cat-modal-title').textContent = 'Kategoriyani Tahrirlash';
  document.getElementById('cat-id').value = id;
  document.getElementById('cat-name').value = name;
  document.getElementById('cat-error').classList.remove('show');
  document.getElementById('cat-modal').classList.add('open');
}

function deleteCat(id) {
  const c = categories.find(x=>x.id===id);
  showConfirm(`"${c?.name||'Kategoriya'}" ni o'chirasizmi?`, async () => {
    try {
      const res = await fetch(API_BASE + `/categories/${id}/delete/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN },
        credentials: 'same-origin',
        body: new URLSearchParams({ csrfmiddlewaretoken: CSRF_TOKEN })
      });
      categories = categories.filter(x=>x.id!==id);
      renderCategories();
      toast('Kategoriya o\'chirildi');
    } catch(e) { toast(e.message, 'error'); }
  });
}

// ─── CATEGORY MODAL ───
document.getElementById('open-cat-modal').addEventListener('click', () => {
  document.getElementById('cat-modal-title').textContent = 'Yangi Kategoriya';
  document.getElementById('cat-id').value = '';
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-error').classList.remove('show');
  document.getElementById('cat-modal').classList.add('open');
});
document.getElementById('close-cat-modal').addEventListener('click', () => document.getElementById('cat-modal').classList.remove('open'));
document.getElementById('cancel-cat').addEventListener('click', () => document.getElementById('cat-modal').classList.remove('open'));

document.getElementById('save-cat').addEventListener('click', async () => {
  const id = document.getElementById('cat-id').value;
  const name = document.getElementById('cat-name').value.trim();
  const errEl = document.getElementById('cat-error');

  if (!name) { errEl.textContent = 'Nom kiritilishi shart!'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  if (id) {
    // UPDATE via Django form-submit (POST to update URL)
    try {
      const res = await fetch(API_BASE + `/categories/${id}/update/`, {
        method:'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/x-www-form-urlencoded' },
        credentials: 'same-origin',
        body: new URLSearchParams({ name, csrfmiddlewaretoken: CSRF_TOKEN })
      });
      const cat = categories.find(c=>c.id==id);
      if (cat) cat.name = name;
      renderCategories();
      document.getElementById('cat-modal').classList.remove('open');
      toast('Kategoriya yangilandi ✓');
    } catch(e) { errEl.textContent = e.message; errEl.classList.add('show'); }
  } else {
    // CREATE via Django form-submit
    try {
      const res = await fetch(API_BASE + `/categories/create/`, {
        method:'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/x-www-form-urlencoded' },
        credentials: 'same-origin',
        body: new URLSearchParams({ name, csrfmiddlewaretoken: CSRF_TOKEN })
      });
      // Reload categories from server
      await loadCategories();
      document.getElementById('cat-modal').classList.remove('open');
      toast('Kategoriya qo\'shildi ✓');
    } catch(e) { errEl.textContent = e.message; errEl.classList.add('show'); }
  }
});

// ─── CONFIRM MODAL ───
function showConfirm(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirm-modal').classList.add('open');
}
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  confirmCallback = null;
});
document.getElementById('confirm-ok').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});

// ─── CLOSE MODALS ON OVERLAY CLICK ───
['task-modal','cat-modal','confirm-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });
});

// ─── INIT ───
updateDateUI();
loadTasks();
</script>
</body>
</html>
